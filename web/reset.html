<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSI Privacy Vault - Account Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --vault-primary: #0f172a; /* Slate 900 */
            --vault-danger: #991b1b; /* Red 800 */
            --background: #f8fafc;
        }

        body {
            background-color: var(--background);
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .vault-card {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border-top: 4px solid var(--vault-danger);
        }

        .animated-button {
            background-color: var(--vault-primary);
            color: white;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .animated-button:hover {
            background-color: #1e293b;
            transform: translateY(-1px);
        }

        .animated-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;
            background: linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg);
        }

        .animated-button:hover::before {
            animation: shine 1.2s forwards;
        }

        @keyframes shine {
            0% { left: -75%; }
            100% { left: 125%; }
        }
    </style>
</head>
<body>

<div class="w-full max-w-md p-10 bg-white rounded-xl vault-card">
    <div class="text-center mb-8">
        <div class="inline-block p-3 bg-red-50 rounded-full mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-800" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <h2 class="text-2xl font-black text-slate-900 tracking-tighter uppercase">Vault Recovery</h2>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.15em] mt-1">Use Master Recovery Key to Reset Access</p>
    </div>

    <form onsubmit="handleReset(event)" class="space-y-5">
        <div>
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Administrator Email</label>
            <input type="email" id="email" required
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-900 focus:bg-white outline-none transition-all text-sm"
                placeholder="admin@tsicoop.org">
        </div>

        <div>
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Master Recovery Key (MRK)</label>
            <input type="text" id="mrk" required
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-900 focus:bg-white outline-none transition-all text-sm font-mono"
                placeholder="MRK-XXXX-XXXX-XXXX">
        </div>

        <div>
            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">New Master Password</label>
            <input type="password" id="new-password" required minlength="12"
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-900 focus:bg-white outline-none transition-all text-sm"
                placeholder="Minimum 12 characters">
        </div>

        <button type="submit" id="reset-btn" class="animated-button w-full py-4 rounded-lg font-bold text-xs uppercase tracking-widest shadow-md mt-2">
            Reset & Update Password
        </button>

        <div class="text-center pt-2">
            <a href="index.html" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 uppercase tracking-widest transition-colors">Return to Login</a>
        </div>

        <p id="status-msg" class="text-[10px] font-bold uppercase text-center hidden"></p>
    </form>
</div>

<script>
async function handleReset(event) {
    event.preventDefault();
    
    const form = event.target;
    const email = document.getElementById('email').value;
    const mrk = document.getElementById('mrk').value;
    const newPass = document.getElementById('new-password').value;
    const btn = document.getElementById('reset-btn');
    const statusEl = document.getElementById('status-msg');

    // UI state: Disable button during processing
    btn.disabled = true;
    btn.innerText = "Processing Reset...";
    statusEl.classList.add('hidden');

    try {
        // Aligned with User.java "break_glass_reset" case
        const payload = { 
            _func: "break_glass_reset", 
            email: email, 
            recovery_key: mrk, 
            new_password: newPass 
        };

        const response = await fetch('api/admin/resetpass', { 
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok && data._success) {
            // 1. Hide the form fields immediately
            form.style.opacity = '0';
            form.style.pointerEvents = 'none';
            
            // 2. Show success state
            statusEl.innerText = "Success: Password Updated. Redirecting...";
            statusEl.className = "text-[10px] font-bold text-green-600 uppercase text-center block mt-4";
            statusEl.classList.remove('hidden');
            
            // 3. Brief delay to allow the user to see the success message, then redirect
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        } else {
            // Handle failure
            statusEl.innerText = data.message || "Recovery Denied: Invalid Credentials";
            statusEl.className = "text-[10px] font-black text-red-500 uppercase text-center block mt-4";
            statusEl.classList.remove('hidden');
            btn.disabled = false;
            btn.innerText = "Reset & Update Password";
        }
    } catch (err) {
        statusEl.innerText = "Vault unreachable: Network Error";
        statusEl.className = "text-[10px] font-bold text-red-500 uppercase text-center block mt-4";
        statusEl.classList.remove('hidden');
        btn.disabled = false;
        btn.innerText = "Reset & Update Password";
    }
}
</script>

</body>
</html>
