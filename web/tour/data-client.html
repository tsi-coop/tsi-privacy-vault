<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSI Vault - Sovereign Data Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tsi-teal: #006A67; }
        body { background-color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .auth-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .data-entry { border-left: 3px solid #006A67; margin-top: 10px; padding: 12px; background: #f1f5f9; border-radius: 0 8px 8px 0; font-family: monospace; font-size: 13px; }
        .flavor-tag { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 9999px; text-transform: uppercase; }
        input[readonly] { background-color: #f1f5f9; color: #64748b; cursor: not-allowed; }
        .search-result-item { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .search-result-item:hover { border-color: #006A67; background: #f0fdfa; }
    </style>
</head>
<body class="p-6 md:p-12">

<div id="authBarrier" class="auth-overlay">
    <div class="bg-white p-10 rounded-3xl w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Vault <span class="text-[#006A67]">Handshake</span></h2>
            <p class="text-slate-400 text-xs mt-1">Initialize Sovereign Identity Protocol</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="api_key" placeholder="API KEY ID" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#006A67]">
            <input type="password" id="api_secret" placeholder="API SECRET" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#006A67]">
            <button onclick="initializeSession()" class="w-full bg-[#006A67] text-white py-4 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-teal-700 transition-all">Connect</button>
        </div>
    </div>
</div>

<div class="max-w-6xl mx-auto">
    <header class="flex justify-between items-end mb-10">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight uppercase italic">TSI <span class="text-[#006A67]">Vault</span></h1>
            <p id="sessionDisplay" class="text-slate-500 text-[10px] font-mono mt-2 uppercase tracking-widest">Interface: Sovereign Layer</p>
        </div>
        <div class="bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm text-right">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Protocol Active</p>
            <p class="text-xs font-bold text-teal-600 uppercase tracking-tighter">● Online</p>
        </div>
    </header>

    <div class="glass-card overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                    <th class="px-8 py-5">Type</th>
                    <th class="px-8 py-5">Entity Code</th>
                    <th class="px-8 py-5 text-right">Operations</th>
                </tr>
            </thead>
            <tbody id="entityTable" class="divide-y divide-slate-100 text-sm"></tbody>
        </table>
    </div>
</div>

<div id="opModal" class="modal">
    <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden">
        <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
            <h3 id="modalTitle" class="text-lg font-black uppercase tracking-tight italic">Operation</h3>
            <button onclick="closeModal()" class="text-slate-400 hover:text-white text-2xl">&times;</button>
        </div>
        
        <div class="p-8">
            <div id="fetchView" class="hidden space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Reference Key</label>
                    <input type="text" id="manualRefKey" class="w-full border border-slate-200 rounded-xl p-4 mt-1 font-mono text-sm outline-none focus:ring-2 focus:ring-teal-500" placeholder="Enter UUID reference...">
                </div>
                <button onclick="executeFetch()" class="w-full bg-[#006A67] text-white py-4 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-teal-700">Fetch & Resolve</button>
                <div id="fetchResult" class="hidden">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Resolution Result</label>
                    <div id="decryptedOutput" class="data-entry"></div>
                </div>
            </div>

            <div id="storeView" class="hidden space-y-4">
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Entity Target</label>
                        <input type="text" id="storeEntityName" readonly class="w-full border border-slate-200 rounded-xl p-4 mt-1 font-mono text-sm outline-none">
                    </div>
                    
                    <div id="textContentContainer">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Content Payload</label>
                        <textarea id="storeContent" rows="3" class="w-full border border-slate-200 rounded-xl p-4 mt-1 font-mono text-sm outline-none focus:ring-2 focus:ring-teal-500" placeholder="Enter sensitive text..."></textarea>
                    </div>

                    <div id="fileContentContainer" class="hidden">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Select File for Vaulting</label>
                        <input type="file" id="fileUploadInput" class="w-full border border-dashed border-slate-300 rounded-xl p-8 mt-1 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-teal-50 file:text-teal-700 hover:file:bg-teal-100">
                    </div>
                </div>

                <input type="hidden" id="storeEntityType">
                <button id="execStoreBtn" class="w-full bg-[#006A67] text-white py-4 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-teal-800">Store Securely</button>
                
                <div id="storeResult" class="hidden">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Reference Receipt</label>
                    <div id="newRefOutput" class="data-entry text-teal-700 font-bold"></div>
                </div>
            </div>

            <div id="searchView" class="hidden space-y-4">
                <div class="relative">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Encrypted Discovery</label>
                    <input type="text" id="searchInput" onkeyup="if(event.key==='Enter')executeSearch()" class="w-full border border-slate-200 rounded-xl p-4 pr-12 mt-1 font-mono text-sm outline-none focus:ring-2 focus:ring-teal-500" placeholder="Search by name, ID or prefix...">
                    <button onclick="executeSearch()" class="absolute right-3 bottom-3 text-teal-600 hover:text-teal-800">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                </div>
                
                <div id="searchStatus" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest text-center hidden">Searching Blind Index...</div>
                
                <div id="searchResults" class="max-h-60 overflow-y-auto space-y-2 mt-4 custom-scrollbar">
                </div>
            </div>
            
            <button onclick="closeModal()" class="w-full mt-6 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-slate-600 transition">Cancel</button>
        </div>
    </div>
</div>

<script>
    const API_ENDPOINT = '/api/client/vault';
    let CREDENTIALS = { key: '', secret: '' };

    async function vaultRequest(funcName, params = {}) {
        const payload = { "_func": funcName, ...params };
        const response = await fetch(API_ENDPOINT, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json', 
                'X-API-Key': CREDENTIALS.key, 
                'X-API-Secret': CREDENTIALS.secret 
            },
            body: JSON.stringify(payload)
        });
        return await response.json();
    }

    async function initializeSession() {
        CREDENTIALS.key = document.getElementById('api_key').value;
        CREDENTIALS.secret = document.getElementById('api_secret').value;
        if(!CREDENTIALS.key || !CREDENTIALS.secret) return;

        const data = await vaultRequest("get_authorized_entities");
        if(data && data.entities) {
            document.getElementById('authBarrier').classList.add('hidden');
            document.getElementById('sessionDisplay').textContent = `Authenticated: ${CREDENTIALS.key}`;
            renderEntities(data.entities);
        }
    }

    function renderEntities(entities) {
        const tbody = document.getElementById('entityTable');
        tbody.innerHTML = entities.map(e => `
            <tr class="hover:bg-slate-50/50 transition">
                <td class="px-8 py-6">
                    <span class="flavor-tag bg-teal-50 text-teal-700">${e.flavor}</span>
                </td>
                <td class="px-8 py-6 font-bold text-slate-700 font-mono text-xs">${e.entity_code}</td>
                <td class="px-8 py-6 text-right space-x-2">
                    <button onclick="openSearchPopup()" class="px-4 py-2 text-[10px] font-black uppercase border border-teal-200 text-teal-600 rounded-md hover:bg-teal-50">Search</button>
                    <button onclick="openFetchPopup()" class="px-4 py-2 text-[10px] font-black uppercase border border-slate-200 text-slate-600 rounded-md hover:bg-slate-100">Fetch</button>
                    <button onclick="openStorePopup('${e.entity_code}', '${e.flavor}')" class="px-4 py-2 text-[10px] font-black uppercase bg-[#006A67] text-white rounded-md hover:bg-teal-800">Store</button>
                </td>
            </tr>
        `).join('');
    }

    function openSearchPopup() {
        resetModal();
        document.getElementById('opModal').style.display = 'flex';
        document.getElementById('searchView').classList.remove('hidden');
        document.getElementById('modalTitle').textContent = "Encrypted Search Index";
        document.getElementById('searchInput').focus();
    }

    async function executeSearch() {
        const term = document.getElementById('searchInput').value;
        if(term.length < 3) return alert("Search term must be at least 3 characters.");

        const status = document.getElementById('searchStatus');
        const resultsContainer = document.getElementById('searchResults');
        
        status.classList.remove('hidden');
        resultsContainer.innerHTML = '';

        const res = await vaultRequest("search_data", { "searchTerm": term });
        status.classList.add('hidden');

        if(res.success && res.results && res.results.length > 0) {
            resultsContainer.innerHTML = res.results.map(r => `
                <div onclick="autoFetch('${r.reference_key}')" class="search-result-item p-4 rounded-xl cursor-pointer flex justify-between items-center group">
                    <div>
                        <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">${r.flavor} Match</div>
                        <div class="font-mono text-xs font-bold text-slate-700">${r.reference_key}</div>
                    </div>
                    <div class="text-teal-600 opacity-0 group-hover:opacity-100 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </div>
                </div>
            `).join('');
        } else {
            resultsContainer.innerHTML = `<div class="text-center p-8 text-slate-400 italic text-xs">No matching encrypted anchors found.</div>`;
        }
    }

    function autoFetch(refKey) {
        openFetchPopup();
        document.getElementById('manualRefKey').value = refKey;
        executeFetch();
    }

    function openFetchPopup() {
        resetModal();
        document.getElementById('opModal').style.display = 'flex';
        document.getElementById('fetchView').classList.remove('hidden');
        document.getElementById('modalTitle').textContent = "Vault Retrieval Protocol";
    }

    async function executeFetch() {
        const refKey = document.getElementById('manualRefKey').value;
        if(!refKey) return alert("Reference Key required");

        const res = await vaultRequest("fetch_data", { "reference-key": refKey });
        
        if(res.success && res.value) {
            document.getElementById('fetchResult').classList.remove('hidden');
            const outputDiv = document.getElementById('decryptedOutput');
            
            if (res.flavor === 'FILE') {
                try {
                    const blobLink = document.createElement('a');
                    blobLink.href = `data:application/octet-stream;base64,${res.value}`;
                    const downloadName = res.fileName || `vault_file_${refKey.substring(0,8)}.dat`;
                    blobLink.download = downloadName;
                    blobLink.click();
                    outputDiv.innerHTML = `<span class="text-teal-600 font-bold">✓ Downloaded: ${downloadName}</span>`;
                } catch (e) {
                    alert("Download failed: Invalid data.");
                }
            } else {
                try {
                    outputDiv.textContent = atob(res.value);
                } catch (e) {
                    outputDiv.textContent = res.value;
                }
            }
        } else {
            alert("Reference not found or unauthorized.");
        }
    }

    function openStorePopup(code, flavor) {
        resetModal();
        document.getElementById('opModal').style.display = 'flex';
        document.getElementById('storeView').classList.remove('hidden');
        document.getElementById('modalTitle').textContent = `${flavor} Storage Protocol`;
        
        document.getElementById('storeEntityName').value = code;
        document.getElementById('storeEntityType').value = flavor;
        
        if (flavor === 'FILE') {
            document.getElementById('textContentContainer').classList.add('hidden');
            document.getElementById('fileContentContainer').classList.remove('hidden');
        } else {
            document.getElementById('textContentContainer').classList.remove('hidden');
            document.getElementById('fileContentContainer').classList.add('hidden');
        }
        
        document.getElementById('execStoreBtn').onclick = () => executeStore();
    }

    async function executeStore() {
        const entityCode = document.getElementById('storeEntityName').value;
        const flavor = document.getElementById('storeEntityType').value;
        let base64Payload = "";
        let fileName = null;

        if (flavor === 'FILE') {
            const fileInput = document.getElementById('fileUploadInput');
            if (fileInput.files.length === 0) return alert("Please select a file.");
            const file = fileInput.files[0];
            fileName = file.name;
            base64Payload = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]); 
                reader.readAsDataURL(file);
            });
        } else {
            const textContent = document.getElementById('storeContent').value;
            if(!textContent) return alert("Content is required.");
            base64Payload = btoa(textContent);
            fileName = "text_payload.txt";
        }

        const res = await vaultRequest("store_data", { 
            "entityType": flavor,
            "entityName": entityCode,
            "content": base64Payload,
            "fileName": fileName 
        });

        if(res.success && res.reference_key) {
            document.getElementById('newRefOutput').textContent = res.reference_key;
            document.getElementById('storeResult').classList.remove('hidden');
        } else {
            alert("Storage failed: " + (res.message || "Protocol Error"));
        }
    }

    function resetModal() {
        // Hide all views
        document.getElementById('fetchView').classList.add('hidden');
        document.getElementById('storeView').classList.add('hidden');
        document.getElementById('searchView').classList.add('hidden');
        
        // Hide result sections
        document.getElementById('fetchResult').classList.add('hidden');
        document.getElementById('storeResult').classList.add('hidden');
        document.getElementById('searchStatus').classList.add('hidden');
        
        // Clear Search Inputs and Results
        document.getElementById('searchInput').value = '';
        document.getElementById('searchResults').innerHTML = '';
        
        // Clear Fetch Inputs and Results
        document.getElementById('manualRefKey').value = '';
        document.getElementById('decryptedOutput').innerHTML = '';
        
        // Clear Store Inputs and Results
        document.getElementById('storeContent').value = '';
        document.getElementById('fileUploadInput').value = '';
        document.getElementById('newRefOutput').textContent = '';
        document.getElementById('storeEntityName').value = '';
        document.getElementById('storeEntityType').value = '';
    }

    function closeModal() { document.getElementById('opModal').style.display = 'none'; }
</script>
</body>
</html>
