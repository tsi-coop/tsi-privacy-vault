<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSI Vault - Sovereign Data Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tsi-teal: #006A67; --tsi-navy: #0f172a; }
        body { background-color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .auth-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .flavor-tag { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 9999px; text-transform: uppercase; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 2000; }
    </style>
</head>
<body class="p-4 md:p-12">

<div id="authBarrier" class="auth-overlay">
    <div class="bg-white p-10 rounded-3xl w-full max-w-md shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Vault <span class="text-[#006A67]">Handshake</span></h2>
            <p class="text-slate-400 text-xs mt-1">Provide API credentials to synchronize entities.</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="api_key" placeholder="API KEY ID" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-mono text-sm outline-none focus:ring-2 focus:ring-[#006A67]">
            <input type="password" id="api_secret" placeholder="API SECRET" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-mono text-sm outline-none focus:ring-2 focus:ring-[#006A67]">
            <button onclick="initializeSession()" class="w-full bg-[#006A67] text-white py-4 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-teal-700 transition-all">Connect to Vault</button>
        </div>
    </div>
</div>

<div class="max-w-6xl mx-auto">
    <header class="flex justify-between items-end mb-10">
        <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight uppercase">Data <span class="text-[#006A67]">Client</span></h1>
            <p id="sessionDisplay" class="text-slate-500 text-[10px] font-mono mt-2 uppercase">Status: Awaiting Initialization</p>
        </div>
        <div class="bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Forensic Anchor</p>
            <p class="text-xs font-bold text-green-600 uppercase">● Active</p>
        </div>
    </header>

    <div class="glass-card overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                    <th class="px-8 py-5">Flavor</th>
                    <th class="px-8 py-5">Entity Resource</th>
                    <th class="px-8 py-5">Access Rights</th>
                    <th class="px-8 py-5 text-right">Operations</th>
                </tr>
            </thead>
            <tbody id="entityTable" class="divide-y divide-slate-100 text-sm">
                </tbody>
        </table>
    </div>
</div>

<div id="opModal" class="modal">
    <div class="bg-white rounded-3xl w-full max-w-xl shadow-2xl overflow-hidden">
        <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
            <div>
                <h3 id="modalTitle" class="text-lg font-black uppercase tracking-tight">Operation</h3>
                <p id="modalSubtitle" class="text-[9px] text-teal-400 font-mono uppercase"></p>
            </div>
            <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl">&times;</button>
        </div>
        
        <div class="p-8">
            <div id="readView" class="hidden space-y-4">
                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 font-mono text-sm break-all" id="decryptedOutput"></div>
                <p class="text-[10px] text-rose-500 font-bold uppercase italic text-center">Event hash written to forensic ledger.</p>
            </div>

            <div id="writeView" class="hidden space-y-4">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">New Sensitive Payload</label>
                <textarea id="writeInput" rows="5" class="w-full border border-slate-200 rounded-2xl p-4 font-mono text-sm outline-none focus:ring-2 focus:ring-teal-500" placeholder="Enter data to encrypt..."></textarea>
                <button id="execWriteBtn" class="w-full bg-[#006A67] text-white py-4 rounded-xl font-black uppercase text-xs tracking-widest shadow-lg">Commit Encrypted Write</button>
            </div>
            
            <button onclick="closeModal()" class="w-full mt-6 text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-slate-600 transition">Discard Transaction</button>
        </div>
    </div>
</div>

<script>
    const API_ENDPOINT = '/api/client/vault'; // Common function gateway
    let CREDENTIALS = { key: '', secret: '' };

    // Centralized _func request handler
    async function vaultRequest(funcName, params = {}) {
        const payload = {
            "_func": funcName,
            ...params
        };

        try {
            const response = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-API-Key': CREDENTIALS.key,
                    'X-API-Secret': CREDENTIALS.secret
                },
                body: JSON.stringify(payload)
            });
            return await response.json();
        } catch (err) {
            console.error("Vault Request Failed", err);
            return { error: true };
        }
    }

    async function initializeSession() {
        CREDENTIALS.key = document.getElementById('api_key').value;
        CREDENTIALS.secret = document.getElementById('api_secret').value;

        if(!CREDENTIALS.key || !CREDENTIALS.secret) return alert("Credentials Missing");

        const data = await vaultRequest("get_authorized_entities");
        
        if(data && data.entities) {
            document.getElementById('authBarrier').classList.add('hidden');
            document.getElementById('sessionDisplay').textContent = `Authenticated: ${CREDENTIALS.key}`;
            renderEntities(data.entities);
        } else {
            alert("Handshake Refused");
        }
    }

    function renderEntities(entities) {
        const tbody = document.getElementById('entityTable');
        tbody.innerHTML = entities.map(e => `
            <tr class="hover:bg-slate-50/50 transition">
                <td class="px-8 py-6">
                    <span class="flavor-tag ${e.flavor === 'ID' ? 'bg-green-50 text-green-700' : e.flavor === 'FILE' ? 'bg-blue-50 text-blue-700' : 'bg-amber-50 text-amber-700'}">
                        ${e.flavor}
                    </span>
                </td>
                <td class="px-8 py-6 font-bold text-slate-700 font-mono text-xs uppercase">${e.entity_code}</td>
                <td class="px-8 py-6">
                    <div class="flex gap-2">
                        <span class="text-[9px] font-black ${e.can_read ? 'text-teal-600' : 'text-slate-200'}">READ</span>
                        <span class="text-[9px] font-black ${e.can_write ? 'text-indigo-600' : 'text-slate-200'}">WRITE</span>
                    </div>
                </td>
                <td class="px-8 py-6 text-right space-x-2">
                    <button onclick="handleOp('read_data', '${e.entity_code}')" class="px-4 py-2 text-[10px] font-black uppercase border border-[#006A67] text-[#006A67] rounded-md ${!e.can_read ? 'opacity-20 cursor-not-allowed' : 'hover:bg-[#006A67] hover:text-white'}" ${!e.can_read ? 'disabled' : ''}>Fetch</button>
                    <button onclick="handleOp('prep_write', '${e.entity_code}')" class="px-4 py-2 text-[10px] font-black uppercase bg-[#006A67] text-white rounded-md ${!e.can_write ? 'opacity-20 cursor-not-allowed' : 'hover:bg-teal-800'}" ${!e.can_write ? 'disabled' : ''}>Update</button>
                </td>
            </tr>
        `).join('');
    }

    async function handleOp(func, code) {
        const modal = document.getElementById('opModal');
        const readView = document.getElementById('readView');
        const writeView = document.getElementById('writeView');
        
        document.getElementById('modalSubtitle').textContent = `Entity: ${code}`;
        
        if(func === 'read_data') {
            document.getElementById('modalTitle').textContent = "Vault Read Operation";
            const response = await vaultRequest("read_entity_data", { entity_code: code });
            document.getElementById('decryptedOutput').textContent = response.decrypted_value || "ERROR: UNABLE TO DECRYPT";
            readView.classList.remove('hidden');
            writeView.classList.add('hidden');
        } else {
            document.getElementById('modalTitle').textContent = "Vault Write Operation";
            readView.classList.add('hidden');
            writeView.classList.remove('hidden');
            document.getElementById('execWriteBtn').onclick = () => executeWrite(code);
        }
        
        modal.style.display = 'flex';
    }

    async function executeWrite(code) {
        const val = document.getElementById('writeInput').value;
        const res = await vaultRequest("write_entity_data", { entity_code: code, payload: val });
        if(res.status === 'SUCCESS') {
            alert("Data Encrypted & Anchored to Forensic Ledger");
            closeModal();
        }
    }

    function closeModal() { document.getElementById('opModal').style.display = 'none'; }
</script>
</body>
</html>
